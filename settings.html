<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Who's that Eevee?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      color: #d4d4d4;
      font-family: sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page-wrapper {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    #navbar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 1.75rem;
    }

    #back-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      transition: border-color 0.2s, color 0.2s;
    }

    #back-btn:hover {
      border-color: #777;
      color: #d4d4d4;
    }

    h1 {
      font-size: 1.4rem;
      color: #f0f0f0;
      margin-bottom: 2rem;
    }

    .section {
      background-color: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .section h2 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1.1rem;
    }

    /* --- Avatar preview --- */
    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    #avatar-preview {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background-color: #3a3a3a;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #ccc;
      overflow: hidden;
      flex-shrink: 0;
    }

    #avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pfp-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Hidden real file input */
    #pfp-input {
      display: none;
    }

    /* --- Shared field styles --- */
    label {
      display: block;
      font-size: 0.85rem;
      color: #a0a0a0;
      margin-bottom: 0.35rem;
    }

    input[type="text"] {
      width: 100%;
      background-color: #2e2e2e;
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.85rem;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #777;
    }

    .hint {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 0.85rem;
    }

    /* --- Buttons --- */
    button {
      background-color: #3a3a3a;
      color: #f0f0f0;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }

    button:hover:not(:disabled) {
      background-color: #4e4e4e;
      border-color: #888;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-danger {
      background: none;
      border-color: #5a2a2a;
      color: #a05050;
    }

    .btn-danger:hover:not(:disabled) {
      background-color: #3a1a1a;
      border-color: #a05050;
      color: #d47070;
    }

    .status-msg {
      font-size: 0.82rem;
      min-height: 1.1em;
      margin-top: 0.5rem;
    }

    .status-ok  { color: #5a9a5a; }
    .status-err { color: #c0392b; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar">
      <button id="back-btn">← Back</button>
    </div>

    <h1>Settings</h1>

    <!-- Profile picture -->
    <div class="section">
      <h2>Profile Picture</h2>
      <div class="avatar-wrap">
        <div id="avatar-preview"></div>
        <div class="pfp-actions">
          <button id="choose-pfp-btn">Choose Image</button>
          <button id="remove-pfp-btn" class="btn-danger">Remove</button>
        </div>
      </div>
      <input type="file" id="pfp-input" accept="image/*" />
      <p class="status-msg" id="pfp-status"></p>
    </div>

    <!-- Screen name -->
    <div class="section">
      <h2>Screen Name</h2>
      <p class="hint">Displayed separately from your login username</p>
      <label for="screen-name-input">Screen name</label>
      <input type="text" id="screen-name-input" maxlength="100" placeholder="Enter a screen name…" />
      <button id="save-name-btn">Save</button>
      <p class="status-msg" id="name-status"></p>
    </div>
  </div>

  <script>
    const username = sessionStorage.getItem('username');
    if (!username) window.location.replace('login.html');

    // ── helpers ──────────────────────────────────────────────────────────────

    function setStatus(el, text, ok) {
      el.textContent = text;
      el.className = 'status-msg ' + (ok ? 'status-ok' : 'status-err');
    }

    function clearStatus(el) {
      el.textContent = '';
      el.className = 'status-msg';
    }

    function renderAvatar(dataUrl) {
      const el = document.getElementById('avatar-preview');
      if (dataUrl) {
        el.innerHTML = `<img src="${dataUrl}" alt="Profile picture" />`;
      } else {
        el.innerHTML = username.charAt(0).toUpperCase();
      }
    }

    // Resize image to ≤ 200×200 and return a JPEG data URL
    function resizeImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = (e) => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            const MAX = 200;
            let { width, height } = img;
            if (width > height) {
              if (width > MAX) { height = Math.round(height * MAX / width); width = MAX; }
            } else {
              if (height > MAX) { width = Math.round(width * MAX / height); height = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── load profile ─────────────────────────────────────────────────────────

    let pendingPfp = undefined; // undefined = not changed, null = remove, string = new data url

    async function loadProfile() {
      try {
        const res = await fetch(`/.netlify/functions/get-profile?username=${encodeURIComponent(username)}`);
        const data = await res.json();
        renderAvatar(data.profilePicture);
        document.getElementById('screen-name-input').value = data.screenName || '';
      } catch {
        // silently ignore; avatar will show initials
        renderAvatar(null);
      }
    }

    loadProfile();

    // ── back button ───────────────────────────────────────────────────────────

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = 'review.html';
    });

    // ── profile picture ───────────────────────────────────────────────────────

    const pfpInput   = document.getElementById('pfp-input');
    const pfpStatus  = document.getElementById('pfp-status');

    document.getElementById('choose-pfp-btn').addEventListener('click', () => {
      pfpInput.click();
    });

    pfpInput.addEventListener('change', async () => {
      const file = pfpInput.files[0];
      if (!file) return;

      clearStatus(pfpStatus);
      const chooseBtn = document.getElementById('choose-pfp-btn');
      chooseBtn.disabled = true;
      chooseBtn.textContent = 'Processing…';

      try {
        const dataUrl = await resizeImage(file);
        pendingPfp = dataUrl;
        renderAvatar(dataUrl);

        // auto-save
        const res = await fetch('/.netlify/functions/update-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, profilePicture: dataUrl })
        });
        if (res.ok) {
          setStatus(pfpStatus, 'Profile picture saved.', true);
          sessionStorage.setItem('profilePicture', dataUrl);
        } else {
          const d = await res.json();
          setStatus(pfpStatus, d.error || 'Failed to save.', false);
        }
      } catch {
        setStatus(pfpStatus, 'Error processing image.', false);
      } finally {
        chooseBtn.disabled = false;
        chooseBtn.textContent = 'Choose Image';
        pfpInput.value = '';
      }
    });

    document.getElementById('remove-pfp-btn').addEventListener('click', async () => {
      clearStatus(pfpStatus);
      const removeBtn = document.getElementById('remove-pfp-btn');
      removeBtn.disabled = true;

      try {
        const res = await fetch('/.netlify/functions/update-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, profilePicture: null })
        });
        if (res.ok) {
          renderAvatar(null);
          sessionStorage.removeItem('profilePicture');
          setStatus(pfpStatus, 'Profile picture removed.', true);
        } else {
          const d = await res.json();
          setStatus(pfpStatus, d.error || 'Failed to remove.', false);
        }
      } catch {
        setStatus(pfpStatus, 'Network error.', false);
      } finally {
        removeBtn.disabled = false;
      }
    });

    // ── screen name ───────────────────────────────────────────────────────────

    const nameStatus = document.getElementById('name-status');

    document.getElementById('save-name-btn').addEventListener('click', async () => {
      clearStatus(nameStatus);
      const saveBtn = document.getElementById('save-name-btn');
      const val = document.getElementById('screen-name-input').value;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      try {
        const res = await fetch('/.netlify/functions/update-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, screenName: val })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('screenName', val.trim());
          setStatus(nameStatus, 'Screen name saved.', true);
        } else {
          setStatus(nameStatus, data.error || 'Failed to save.', false);
        }
      } catch {
        setStatus(nameStatus, 'Network error.', false);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
      }
    });
  </script>
</body>
</html>
