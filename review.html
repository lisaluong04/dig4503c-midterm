<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's that Eevee?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      color: #d4d4d4;
      font-family: sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page-wrapper {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* --- Two-column layout --- */
    #main-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    #left-panel {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    #right-panel {
      flex: 1;
      min-width: 0;
    }

    /* --- Nav bar --- */
    #navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    #logout-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      transition: border-color 0.2s, color 0.2s;
    }

    #logout-btn:hover {
      border-color: #777;
      color: #d4d4d4;
    }

    #settings-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #444;
      background-color: #3a3a3a;
      color: #ccc;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    #settings-btn:hover {
      border-color: #777;
    }

    #settings-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* --- Chart --- */
    #chart-section {
      background-color: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    #chart-section h2 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    #chart {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .bar-label {
      width: 48px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .bar-label img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .bar-label span {
      font-size: 0.65rem;
      color: #777;
    }

    .bar-track {
      flex: 1;
      background-color: #2e2e2e;
      border-radius: 4px;
      height: 22px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background-color: #555;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .bar-count {
      width: 30px;
      font-size: 0.82rem;
      color: #666;
      flex-shrink: 0;
    }

    /* --- Controls --- */
    #controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #search {
      width: 100%;
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.55rem 0.85rem;
    }

    #search:focus {
      outline: none;
      border-color: #666;
    }

    #sort {
      width: 100%;
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #d4d4d4;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }

    #sort:focus { outline: none; border-color: #666; }

    .filter-label {
      font-size: 0.78rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .chip {
      background: none;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      color: #888;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.85rem;
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
    }

    .chip:hover {
      border-color: #666;
      color: #d4d4d4;
      background: none;
    }

    .chip.active {
      border-color: #999;
      color: #f0f0f0;
      background-color: #3a3a3a;
    }

    /* --- Feed --- */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    #loading {
      text-align: center;
      color: #555;
      padding: 3rem 0;
      font-size: 0.95rem;
    }

    /* --- Post card --- */
    .post {
      background-color: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      overflow: hidden;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #333;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #ccc;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-meta {
      display: flex;
      flex-direction: column;
    }

    .post-username {
      font-weight: 600;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .post-date {
      font-size: 0.78rem;
      color: #555;
    }

    .post-body {
      padding: 1.25rem;
    }

    .post-body h2 {
      color: #666;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.72rem;
      margin-bottom: 0.85rem;
    }

    .picks {
      display: flex;
      justify-content: space-around;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .pick {
      flex: 1;
      background-color: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }

    .pick img {
      width: 100%;
      max-width: 80px;
      display: block;
      margin: 0 auto 0.5rem;
    }

    .pick span {
      font-size: 0.85rem;
      color: #c0c0c0;
    }

    .post-comment {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
      border-top: 1px solid #2e2e2e;
      padding-top: 0.85rem;
      font-style: italic;
    }

    /* --- Footer --- */
    .post-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-right {
      display: flex;
      gap: 0.5rem;
    }

    button {
      background-color: #3a3a3a;
      color: #f0f0f0;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 0.45rem 1.1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }

    button:hover {
      background-color: #4e4e4e;
      border-color: #888;
    }

    .like-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
    }

    .like-btn:hover:not(:disabled) {
      border-color: #777;
      color: #d4d4d4;
      background: none;
    }

    .like-btn.liked {
      border-color: #777;
      color: #d4d4d4;
    }

    .like-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .delete-btn {
      background: none;
      border: 1px solid #5a2a2a;
      color: #a05050;
    }

    .delete-btn:hover {
      background-color: #3a1a1a;
      border-color: #a05050;
      color: #d47070;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar">
      <button id="settings-btn" title="Settings" onclick="window.location.href='settings.html'"></button>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="main-layout">
      <div id="left-panel">
        <div id="chart-section">
          <h2>Most Popular Eeveelutions</h2>
          <div id="chart"></div>
        </div>

        <div id="controls">
          <input id="search" type="text" placeholder="Search by username..." />
          <select id="sort">
            <option value="newest">Sort: Newest</option>
            <option value="likes-high">Sort: Most Popular</option>
            <option value="likes-low">Sort: Least Popular</option>
          </select>
          <span class="filter-label">Filter by Eeveelution</span>
          <div id="filter-chips">
            <button class="chip" data-name="Espeon">Espeon</button>
            <button class="chip" data-name="Flareon">Flareon</button>
            <button class="chip" data-name="Glaceon">Glaceon</button>
            <button class="chip" data-name="Jolteon">Jolteon</button>
            <button class="chip" data-name="Leafeon">Leafeon</button>
            <button class="chip" data-name="Sylveon">Sylveon</button>
            <button class="chip" data-name="Umbreon">Umbreon</button>
            <button class="chip" data-name="Vaporeon">Vaporeon</button>
          </div>
        </div>
      </div>

      <div id="right-panel">
        <div id="feed">
          <p id="loading">Loading posts...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const username = sessionStorage.getItem('username');
    if (!username) window.location.replace('login.html');

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = 'login.html';
    });

    // Load profile picture for the settings button
    function updateSettingsBtn(profilePicture) {
      const btn = document.getElementById('settings-btn');
      if (profilePicture) {
        btn.innerHTML = `<img src="${profilePicture}" alt="Profile" />`;
      } else {
        btn.textContent = username.charAt(0).toUpperCase();
      }
    }

    async function loadProfile() {
      // Use cached value from sessionStorage first for instant display
      const cached = sessionStorage.getItem('profilePicture');
      updateSettingsBtn(cached || null);

      try {
        const res = await fetch(`/.netlify/functions/get-profile?username=${encodeURIComponent(username)}`);
        const data = await res.json();
        if (data.profilePicture) {
          sessionStorage.setItem('profilePicture', data.profilePicture);
        } else {
          sessionStorage.removeItem('profilePicture');
        }
        updateSettingsBtn(data.profilePicture);
      } catch {
        // keep whatever was in sessionStorage
      }
    }

    loadProfile();

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false
      });
    }

    function buildPost(post) {
      const isOwner = post.username === username;

      const card = document.createElement('div');
      card.className = 'post';
      card.dataset.postId = post.id;

      // Header
      const header = document.createElement('div');
      header.className = 'post-header';
      const avatarContent = post.profilePicture
        ? `<img src="${post.profilePicture}" alt="${post.username}" />`
        : post.username.charAt(0).toUpperCase();

      header.innerHTML = `
        <div class="avatar">${avatarContent}</div>
        <div class="post-meta">
          <span class="post-username">${post.displayName || post.username}</span>
          <span class="post-date">${formatDate(post.createdAt)}</span>
        </div>
      `;

      // Body
      const body = document.createElement('div');
      body.className = 'post-body';

      const picksHTML = post.picks.map(name => `
        <div class="pick">
          <img src="images/${name}.png" alt="${name}" />
          <span>${name}</span>
        </div>
      `).join('');

      const commentHTML = post.comment
        ? `<p class="post-comment">"${post.comment}"</p>`
        : '';

      body.innerHTML = `
        <h2>Top 3 Eeveelutions</h2>
        <div class="picks">${picksHTML}</div>
        ${commentHTML}
      `;

      // Footer
      const footer = document.createElement('div');
      footer.className = 'post-footer';

      const likeBtn = document.createElement('button');
      likeBtn.className = `like-btn${post.userLiked ? ' liked' : ''}`;
      likeBtn.textContent = `${post.userLiked ? '♥' : '♡'} ${post.likeCount}`;
      likeBtn.disabled = isOwner;

      likeBtn.addEventListener('click', async () => {
        likeBtn.disabled = true;
        const res = await fetch('/.netlify/functions/like', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ postId: post.id, username })
        });
        const data = await res.json();
        if (res.ok) {
          likeBtn.textContent = `${data.liked ? '♥' : '♡'} ${data.likeCount}`;
          likeBtn.classList.toggle('liked', data.liked);
        }
        likeBtn.disabled = false;
      });

      const footerRight = document.createElement('div');
      footerRight.className = 'footer-right';

      if (isOwner) {
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', () => {
          window.location.href = 'eevee.html';
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', async () => {
          deleteBtn.disabled = true;
          await fetch('/.netlify/functions/delete-post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ postId: post.id, username })
          });
          sessionStorage.removeItem('picks');
          sessionStorage.removeItem('comment');
          sessionStorage.removeItem('postAuthor');
          sessionStorage.removeItem('postId');
          window.location.href = 'eevee.html';
        });

        footerRight.append(editBtn, deleteBtn);
      }

      footer.append(likeBtn, footerRight);
      card.append(header, body, footer);
      return card;
    }

    let allPosts = [];
    let activeFilters = new Set();

    function renderChart(posts) {
      const counts = {};
      posts.forEach(post => post.picks.forEach(p => {
        counts[p] = (counts[p] || 0) + 1;
      }));
      const top3 = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);
      const max = top3[0]?.[1] || 1;
      const container = document.getElementById('chart');
      container.innerHTML = '';
      if (top3.length === 0) {
        container.innerHTML = '<span style="font-size:0.85rem;color:#555;">No data yet.</span>';
        return;
      }
      top3.forEach(([name, count]) => {
        const pct = (count / max) * 100;
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
          <div class="bar-label">
            <img src="images/${name}.png" alt="${name}" />
            <span>${name}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="bar-count">${count}</span>
        `;
        container.appendChild(row);
      });
    }

    function applyAndRender() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const sortVal = document.getElementById('sort').value;

      let result = allPosts.filter(post => {
        const matchesUser = !query || post.username.toLowerCase().includes(query);
        const matchesFilter = activeFilters.size === 0 ||
          post.picks.some(p => activeFilters.has(p));
        return matchesUser && matchesFilter;
      });

      result.sort((a, b) => {
        if (sortVal === 'likes-high') return b.likeCount - a.likeCount;
        if (sortVal === 'likes-low')  return a.likeCount - b.likeCount;
        // newest: user's post first, then by date
        if (a.username === username && b.username !== username) return -1;
        if (b.username === username && a.username !== username) return  1;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      if (result.length === 0) {
        feed.innerHTML = '<p id="loading">No posts match.</p>';
      } else {
        result.forEach(post => feed.appendChild(buildPost(post)));
      }
    }

    async function loadFeed() {
      const res = await fetch(`/.netlify/functions/get-all-posts?username=${encodeURIComponent(username)}`);
      const data = await res.json();

      if (!data.posts || data.posts.length === 0) {
        document.getElementById('feed').innerHTML = '<p id="loading">No posts yet. Be the first!</p>';
        return;
      }

      allPosts = data.posts;
      renderChart(allPosts);
      applyAndRender();
    }

    // Search
    document.getElementById('search').addEventListener('input', applyAndRender);

    // Sort
    document.getElementById('sort').addEventListener('change', applyAndRender);

    // Filter chips
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const name = chip.dataset.name;
        if (activeFilters.has(name)) {
          activeFilters.delete(name);
          chip.classList.remove('active');
        } else {
          activeFilters.add(name);
          chip.classList.add('active');
        }
        applyAndRender();
      });
    });

    loadFeed();
  </script>
</body>
</html>
