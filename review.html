<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's that Eevee?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      color: #d4d4d4;
      font-family: sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page-wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    /* --- Nav bar --- */
    #navbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
    }

    #logout-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      transition: border-color 0.2s, color 0.2s;
    }

    #logout-btn:hover {
      border-color: #777;
      color: #d4d4d4;
    }

    /* --- Feed --- */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    #loading {
      text-align: center;
      color: #555;
      padding: 3rem 0;
      font-size: 0.95rem;
    }

    /* --- Post card --- */
    .post {
      background-color: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      overflow: hidden;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #333;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #ccc;
      flex-shrink: 0;
    }

    .post-meta {
      display: flex;
      flex-direction: column;
    }

    .post-username {
      font-weight: 600;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .post-date {
      font-size: 0.78rem;
      color: #555;
    }

    .post-body {
      padding: 1.25rem;
    }

    .post-body h2 {
      color: #666;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.72rem;
      margin-bottom: 0.85rem;
    }

    .picks {
      display: flex;
      justify-content: space-around;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .pick {
      flex: 1;
      background-color: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }

    .pick img {
      width: 100%;
      max-width: 80px;
      display: block;
      margin: 0 auto 0.5rem;
    }

    .pick span {
      font-size: 0.85rem;
      color: #c0c0c0;
    }

    .post-comment {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
      border-top: 1px solid #2e2e2e;
      padding-top: 0.85rem;
      font-style: italic;
    }

    /* --- Footer --- */
    .post-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-right {
      display: flex;
      gap: 0.5rem;
    }

    button {
      background-color: #3a3a3a;
      color: #f0f0f0;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 0.45rem 1.1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }

    button:hover {
      background-color: #4e4e4e;
      border-color: #888;
    }

    .like-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
    }

    .like-btn:hover:not(:disabled) {
      border-color: #777;
      color: #d4d4d4;
      background: none;
    }

    .like-btn.liked {
      border-color: #777;
      color: #d4d4d4;
    }

    .like-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .delete-btn {
      background: none;
      border: 1px solid #5a2a2a;
      color: #a05050;
    }

    .delete-btn:hover {
      background-color: #3a1a1a;
      border-color: #a05050;
      color: #d47070;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar">
      <button id="logout-btn">Logout</button>
    </div>
    <div id="feed">
      <p id="loading">Loading posts...</p>
    </div>
  </div>

  <script>
    const username = sessionStorage.getItem('username');
    if (!username) window.location.replace('login.html');

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = 'login.html';
    });

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false
      });
    }

    function buildPost(post) {
      const isOwner = post.username === username;

      const card = document.createElement('div');
      card.className = 'post';
      card.dataset.postId = post.id;

      // Header
      const header = document.createElement('div');
      header.className = 'post-header';
      header.innerHTML = `
        <div class="avatar">${post.username.charAt(0).toUpperCase()}</div>
        <div class="post-meta">
          <span class="post-username">${post.username}</span>
          <span class="post-date">${formatDate(post.createdAt)}</span>
        </div>
      `;

      // Body
      const body = document.createElement('div');
      body.className = 'post-body';

      const picksHTML = post.picks.map(name => `
        <div class="pick">
          <img src="images/${name}.png" alt="${name}" />
          <span>${name}</span>
        </div>
      `).join('');

      const commentHTML = post.comment
        ? `<p class="post-comment">"${post.comment}"</p>`
        : '';

      body.innerHTML = `
        <h2>Top 3 Eeveelutions</h2>
        <div class="picks">${picksHTML}</div>
        ${commentHTML}
      `;

      // Footer
      const footer = document.createElement('div');
      footer.className = 'post-footer';

      const likeBtn = document.createElement('button');
      likeBtn.className = `like-btn${post.userLiked ? ' liked' : ''}`;
      likeBtn.textContent = `${post.userLiked ? '♥' : '♡'} ${post.likeCount}`;
      likeBtn.disabled = isOwner;

      likeBtn.addEventListener('click', async () => {
        likeBtn.disabled = true;
        const res = await fetch('/.netlify/functions/like', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ postId: post.id, username })
        });
        const data = await res.json();
        if (res.ok) {
          likeBtn.textContent = `${data.liked ? '♥' : '♡'} ${data.likeCount}`;
          likeBtn.classList.toggle('liked', data.liked);
        }
        likeBtn.disabled = false;
      });

      const footerRight = document.createElement('div');
      footerRight.className = 'footer-right';

      if (isOwner) {
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', () => {
          window.location.href = 'eevee.html';
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', async () => {
          deleteBtn.disabled = true;
          await fetch('/.netlify/functions/delete-post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ postId: post.id, username })
          });
          sessionStorage.removeItem('picks');
          sessionStorage.removeItem('comment');
          sessionStorage.removeItem('postAuthor');
          sessionStorage.removeItem('postId');
          card.remove();
        });

        footerRight.append(editBtn, deleteBtn);
      }

      footer.append(likeBtn, footerRight);
      card.append(header, body, footer);
      return card;
    }

    async function loadFeed() {
      const res = await fetch(`/.netlify/functions/get-all-posts?username=${encodeURIComponent(username)}`);
      const data = await res.json();
      const feed = document.getElementById('feed');
      feed.innerHTML = '';

      if (!data.posts || data.posts.length === 0) {
        feed.innerHTML = '<p id="loading">No posts yet. Be the first!</p>';
        return;
      }

      const sorted = [...data.posts].sort((a, b) => {
        if (a.username === username) return -1;
        if (b.username === username) return 1;
        return 0;
      });
      sorted.forEach(post => feed.appendChild(buildPost(post)));
    }

    loadFeed();
  </script>
</body>
</html>
