<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's that Eevee?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      color: #d4d4d4;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      color: #f0f0f0;
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }

    p {
      font-size: 1.1rem;
      color: #a0a0a0;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    a.btn {
      display: inline-block;
      background-color: #3a3a3a;
      color: #f0f0f0;
      text-decoration: none;
      padding: 0.85rem 2.25rem;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 1rem;
      transition: background-color 0.2s, border-color 0.2s;
    }

    a.btn:hover {
      background-color: #4e4e4e;
      border-color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Who's that Eevee?</h1>
    <p>Vote for the best eeveelutions and see what others have to say!</p>
    <a class="btn" href="eevee.html">Get Started</a>
  </div>
</body>
</html>
