<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Who's that Eevee?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      color: #d4d4d4;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background-color: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-size: 1.5rem;
      color: #f0f0f0;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #a0a0a0;
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      background-color: #2e2e2e;
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
    }

    input:focus {
      outline: none;
      border-color: #777;
    }

    #error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      min-height: 1.1em;
    }

    button {
      width: 100%;
      padding: 0.85rem;
      background-color: #3a3a3a;
      color: #f0f0f0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
      margin-top: 0.5rem;
    }

    button:hover {
      background-color: #4e4e4e;
      border-color: #888;
    }

    .switch {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #666;
    }

    .switch a {
      color: #a0a0a0;
      text-decoration: none;
    }

    .switch a:hover {
      color: #d4d4d4;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign Up</h1>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="new-password" />
    </div>

    <div class="field">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" autocomplete="new-password" />
    </div>

    <p id="error-msg"></p>

    <button id="register-btn">Sign Up</button>
    <p class="switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    const registerBtn = document.getElementById('register-btn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const errorMsg = document.getElementById('error-msg');

    registerBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;

      if (!username || !password || !confirm) {
        errorMsg.textContent = 'Please fill out all fields.';
        return;
      }

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      errorMsg.textContent = '';
      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating account...';

      try {
        const res = await fetch('/.netlify/functions/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Registration failed.';
          return;
        }

        sessionStorage.setItem('username', data.username);
        window.location.href = 'eevee.html';
      } catch {
        errorMsg.textContent = 'Network error. Please try again.';
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = 'Sign Up';
      }
    });

    [usernameInput, passwordInput, confirmInput].forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') registerBtn.click();
      });
    });
  </script>
</body>
</html>
